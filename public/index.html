<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hashcoin - Exchange in Telegram</title>
  <meta name="description" content="The easiest way to exchange digital goods perfectly synced with Telegram Stars.">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="container">
    <section class="hero-content">
      <div class="logo-container">
        <!-- 
          * Memoria como Código:
          * Se utilizará un <img> apuntando a un archivo local (logo.svg).
          * Asegúrate de ubicar la imagen enviada "logo.svg" en la carpeta public/.
        -->
        <img src="logo.svg" alt="Hashcoin Logo" class="brand-logo" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
        <h1 id="logo-fallback" style="display:none;" class="fallback-text">#HASH<span class="highlight">COIN</span></h1>
      </div>
      
      <h2 class="hero-title">
        Exchange in <span class="highlight-gradient">Telegram</span>
      </h2>
      <p class="hero-subtitle">
        A seamless and premium experience for digital trading, seamlessly integrated with Telegram Stars. Open the app, browse, and trade instantly.
      </p>
      
      <a href="https://t.me/hashcobot" target="_blank" class="cta-button">
        Launch Web App
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </a>
    </section>

    <section class="hero-visual">
      <div class="phone-mockup">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="app-header">
            <div class="app-title">Hashcoin</div>
            <div class="app-balance">454 XTR</div>
          </div>
          <div class="app-content">
            <a href="https://t.me/hashcobot" target="_blank" style="text-decoration: none; color: inherit;">
              <div class="card">
                <div class="card-icon">🔑</div>
                <div class="card-info">
                  <h4>Member Access</h4>
                  <p>9075 XTR</p>
                </div>
              </div>
            </a>
            <a href="https://t.me/hashcobot" target="_blank" style="text-decoration: none; color: inherit;">
              <div class="card">
                <div class="card-icon">💎</div>
                <div class="card-info">
                  <h4>VIP Level 1</h4>
                  <p>907462 XTR</p>
                </div>
              </div>
            </a>
            <a href="https://t.me/hashcobot" target="_blank" style="text-decoration: none; color: inherit;">
              <div class="card">
                <div class="card-icon">🚀</div>
                <div class="card-info">
                  <h4>Exclusive Content</h4>
                  <p>226865 XTR</p>
                </div>
              </div>
            </a>
          </div>
          <div class="app-bottom-bar"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
